name: Dyslexia Daily Report

on:
  schedule:
    - cron: "0 5 * * *" # UTC 05:00 = 台北時間 13:00
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine date
        id: date
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}"
          if [ -n "$INPUT_DATE" ]; then
            if echo "$INPUT_DATE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              echo "target=$INPUT_DATE" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Invalid date format: must be YYYY-MM-DD"
              exit 1
            fi
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch papers from PubMed
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          python scripts/fetch_papers.py \
            --days 7 \
            --max-papers 40 \
            --json \
            --output papers.json
        continue-on-error: true

      - name: Check papers data
        id: papers
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          if [ -f papers.json ] && grep -q '"count"' papers.json; then
            COUNT=$(python -c "import json; print(json.load(open('papers.json')).get('count',0))")
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "{\"date\":\"$TARGET\",\"count\":0,\"papers\":[]}" > papers.json
            echo "No papers found, will generate empty report"
          fi

      - name: Generate report with Zhipu AI
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          python scripts/generate_report.py \
            --input papers.json \
            --output "docs/dyslexia-${TARGET}.html" \
            --api-key "$ZHIPU_API_KEY"

      - name: Generate index page
        run: python scripts/generate_index.py

      - name: Commit and push
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "dyslexia daily report: ${TARGET}"
          git pull --rebase origin main
          git push

      - name: Summary
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          COUNT="${{ steps.papers.outputs.count }}"
          echo "### Dyslexia Daily Report" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** ${TARGET}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Papers analyzed:** ${COUNT}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Report:** [dyslexia-${TARGET}.html](https://u8901006.github.io/dyslexia-brain/dyslexia-${TARGET}.html)" >> "$GITHUB_STEP_SUMMARY"
